# Update pinned action SHAs with:
#   gh api repos/actions/checkout/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/actions/setup-python/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/SonarSource/sonarcloud-github-action/git/ref/tags/v5 --jq '.object.sha'
name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 1 * *"  # first of every month — keeps SONAR_TOKEN alive

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # required for SonarCloud blame info

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov --cov-report=xml

      - name: Type check
        if: matrix.python-version == '3.13'
        run: pyright src/

      - name: Lint
        if: matrix.python-version == '3.13'
        run: ruff check src/ tests/

      - name: License check
        if: matrix.python-version == '3.13'
        run: |
          pip-licenses --format=plain --order=license \
            --allow-only="MIT License;MIT;BSD License;BSD-2-Clause;BSD-3-Clause;Apache Software License;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Mozilla Public License 2.0 (MPL 2.0);PSF-2.0;Python Software Foundation License"

      - name: SonarCloud scan
        if: ${{ matrix.python-version == '3.13' && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
