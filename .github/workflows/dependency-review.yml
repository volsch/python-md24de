name: Dependency Review

on: [pull_request]

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # allows posting a summary comment on the PR

    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          deny-licenses: >-
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0,
            LGPL-2.1,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later
          comment-summary-in-pr: always
