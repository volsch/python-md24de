# Update pinned action SHAs with:
#   gh api repos/actions/checkout/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/actions/dependency-review-action/git/ref/tags/v5.0.0 --jq '.object.sha'
name: Dependency Review

on: [pull_request]

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # allows posting a summary comment on the PR

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          deny-licenses: >-
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0,
            LGPL-2.1,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later
          comment-summary-in-pr: always
