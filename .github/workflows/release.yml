# Update pinned action SHAs with:
#   gh api repos/actions/checkout/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/actions/setup-python/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/softprops/action-gh-release/git/ref/tags/v3 --jq '.object.sha'
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          generate_release_notes: true
